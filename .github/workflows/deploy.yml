[15/07/2026 02:37] Jahongir Akam: name: Build and deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: rm -rf node_modules && npm install

      - name: Build
        run: npm run build

      - name: Commit built files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Auto-build: yangilangan sayt"
          git push
